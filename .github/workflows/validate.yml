name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run first validation pass
        run: npm run validate

      - name: Run second validation pass
        run: npm run validate

      - name: Run benchmark path
        run: npm run benchmark:rules
