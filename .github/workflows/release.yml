name: 🚀 Release

on:
  push:
    branches:
      - master
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org/"

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

      - name: ✅ Run validation gate
        run: npm run validate

      - name: 📝 Build generated docs
        run: npm run docs

      - name: 🔎 Verify release baseline
        run: |
          package_name=$(npm pkg get name | tr -d '"')

          if published_version=$(npm view "$package_name" version 2>/dev/null); then
            expected_tag="v$published_version"

            if git rev-parse --verify --quiet "refs/tags/$expected_tag" >/dev/null; then
              echo "Found published release baseline tag $expected_tag."
              exit 0
            fi

            echo "::error title=Missing release tag::npm already has $package_name@$published_version but git tag $expected_tag is missing. Create the matching tag on the commit that produced the published package before rerunning release."
            exit 1
          fi

          echo "No published package found on npm yet. Semantic-release will create the initial release from commit history."

      - name: 🎉 Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
